name: Daily Checkin

on:
  schedule:
    # 每天北京时间 8:00 执行 (UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create config from secret
        run: |
          mkdir -p config
          echo "$CONFIG_YAML" > config/config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}

      - name: Run checkin
        id: checkin
        env:
          GITHUB_ACTIONS: "false"
          CAPTCHA_PROVIDER: ${{ secrets.CAPTCHA_PROVIDER }}
          CAPTCHA_API_KEY: ${{ secrets.CAPTCHA_API_KEY }}
        run: |
          set +e
          python main.py 2>&1 | tee output.log
          echo "result<<EOF" >> $GITHUB_OUTPUT
          cat output.log >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Push result via wxpusher
        if: always()
        env:
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
        run: |
          RESULT=$(cat output.log | grep -E 'INFO|ERROR|WARNING|签到|米游币|奖励|旅行者' | sed 's/^[0-9-]*T[0-9:.]*Z //' | sed 's/^[0-9-]* [0-9:]* //')
          if [ -z "$RESULT" ]; then
            RESULT=$(cat output.log)
          fi
          # 转义 JSON 特殊字符
          RESULT=$(echo "$RESULT" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          curl -s -X POST "https://wxpusher.zjiecode.com/api/send/message" \
            -H "Content-Type: application/json" \
            -d "{
              \"appToken\": \"$WXPUSHER_APP_TOKEN\",
              \"content\": $RESULT,
              \"summary\": \"米游社签到结果\",
              \"contentType\": 1,
              \"uids\": [\"$WXPUSHER_UIDS\"]
            }"
